name: Unity CI/CD to Itch.io 🚀

on:
  push:
    branches: [ main ]

env:
  UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
  ITCH_USERNAME: your-itch-username          # Change this!
  ITCH_GAME_ID: your-game-slug               # Change this!
  UNITY_PROJECT_PATH: Nexus-VR-Game          # 👈 Set your subfolder name here!

jobs:
  # --- JOB 1: RUN TESTS ---
  test:
    name: Run Unity Tests 🧪
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Cache Library folder
        uses: actions/cache@v4
        with:
          path: ${{ env.UNITY_PROJECT_PATH }}/Library
          key: Library-${{ hashFiles(format('{0}/ProjectSettings/ProjectVersion.txt', env.UNITY_PROJECT_PATH)) }}
          restore-keys: Library-

      - name: Run EditMode & PlayMode Tests
        uses: game-ci/unity-test-runner@v4
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
        with:
          githubToken: ${{ secrets.GITHUB_TOKEN }}
          projectPath: ${{ env.UNITY_PROJECT_PATH }} # 👈 Tells the runner where to find the project

  # --- JOB 2: BUILD THE GAME ---
  build:
    name: Build Game 🛠️
    needs: test
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        targetPlatform:
          - StandaloneWindows64
          - WebGL
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Cache Library folder
        uses: actions/cache@v4
        with:
          path: ${{ env.UNITY_PROJECT_PATH }}/Library
          key: Library-${{ matrix.targetPlatform }}-${{ hashFiles(format('{0}/ProjectSettings/ProjectVersion.txt', env.UNITY_PROJECT_PATH)) }}
          restore-keys: Library-${{ matrix.targetPlatform }}-

      - name: Build Unity Project
        uses: game-ci/unity-builder@v4
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
        with:
          targetPlatform: ${{ matrix.targetPlatform }}
          projectPath: ${{ env.UNITY_PROJECT_PATH }} # 👈 Tells the builder where to find the project

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Build-${{ matrix.targetPlatform }}
          path: ${{ env.UNITY_PROJECT_PATH }}/build/${{ matrix.targetPlatform }}

  # --- JOB 3: DEPLOY TO ITCH.IO ---
  deploy:
    name: Push to Itch.io 📦
    needs: build
    runs-on: ubuntu-latest
    strategy:
      matrix:
        targetPlatform:
          - StandaloneWindows64
          - WebGL
    steps:
      - name: Download Build Artifacts
        uses: actions/download-artifact@v4
        with:
          name: Build-${{ matrix.targetPlatform }}
          path: ${{ env.UNITY_PROJECT_PATH }}/build/${{ matrix.targetPlatform }}

      - name: Deploy to Itch.io via Butler
        uses: josephbmanley/butler-publish-to-itch@v1.2.1
        with:
          api_key: ${{ secrets.BUTLER_API_KEY }}
          channel: ${{ matrix.targetPlatform == 'StandaloneWindows64' && 'windows-x64' || 'webgl' }}
          game: ${{ env.ITCH_GAME_ID }}
          user: ${{ env.ITCH_USERNAME }}
          path: ${{ env.UNITY_PROJECT_PATH }}/build/${{ matrix.targetPlatform }}
