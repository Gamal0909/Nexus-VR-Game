name: Get Unity Activation File 🔑

on: workflow_dispatch # Allows you to run this manually from the Actions tab

jobs:
  activation:
    name: Request Manual Activation File
    runs-on: ubuntu-latest
    steps:
      # 1. Request the manual activation file (.alf)
      - name: Request manual activation file
        uses: game-ci/unity-builder@v4
        with:
          entrypoint: /version # Runs a quick system check to bypass building and force activation output
          
      # 2. Upload the generated .alf file as a downloadable artifact
      - name: Upload activation file as artifact
        uses: actions/upload-artifact@v4
        with:
          name: manual-activation-file
          path: ./*.alf
